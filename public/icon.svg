<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>

  <!-- QR corner squares (top-left, top-right, bottom-left) -->
  <!-- Top-left -->
  <rect x="8" y="8" width="18" height="18" rx="3" fill="#e8c97e"/>
  <rect x="12" y="12" width="10" height="10" rx="1.5" fill="#1a1a2e"/>
  <rect x="14" y="14" width="6" height="6" rx="1" fill="#e8c97e"/>

  <!-- Top-right -->
  <rect x="38" y="8" width="18" height="18" rx="3" fill="#e8c97e"/>
  <rect x="42" y="12" width="10" height="10" rx="1.5" fill="#1a1a2e"/>
  <rect x="44" y="14" width="6" height="6" rx="1" fill="#e8c97e"/>

  <!-- Bottom-left -->
  <rect x="8" y="38" width="18" height="18" rx="3" fill="#e8c97e"/>
  <rect x="12" y="42" width="10" height="10" rx="1.5" fill="#1a1a2e"/>
  <rect x="14" y="44" width="6" height="6" rx="1" fill="#e8c97e"/>

  <!-- Data dots (bottom-right quadrant, representing QR data) -->
  <rect x="38" y="38" width="5" height="5" rx="1" fill="#e8c97e" opacity="0.9"/>
  <rect x="46" y="38" width="5" height="5" rx="1" fill="#e8c97e" opacity="0.5"/>
  <rect x="54" y="38" width="5" height="5" rx="1" fill="#e8c97e" opacity="0.8"/>
  <rect x="38" y="46" width="5" height="5" rx="1" fill="#e8c97e" opacity="0.4"/>
  <rect x="46" y="46" width="5" height="5" rx="1" fill="#e8c97e" opacity="1"/>
  <rect x="54" y="46" width="5" height="5" rx="1" fill="#e8c97e" opacity="0.6"/>
  <rect x="38" y="54" width="5" height="5" rx="1" fill="#e8c97e" opacity="0.7"/>
  <rect x="46" y="54" width="5" height="5" rx="1" fill="#e8c97e" opacity="0.3"/>
  <rect x="54" y="54" width="5" height="5" rx="1" fill="#e8c97e" opacity="1"/>
</svg>
